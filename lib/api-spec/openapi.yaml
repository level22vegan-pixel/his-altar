openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: config
    description: Configuration operations
  - name: altar-reports
    description: Altar report operations
  - name: daily-altar-reports
    description: Daily altar report operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/verify:
    post:
      operationId: verifyLogin
      tags: [auth]
      summary: Verify login sequence
      description: Verifies that the submitted number sequence matches the configured login code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyLoginBody"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
  /config/login-code:
    get:
      operationId: getLoginCode
      tags: [config]
      summary: Get current login code
      description: Returns the current login code (admin use only)
      responses:
        "200":
          description: Current login code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginCodeConfig"
    put:
      operationId: updateLoginCode
      tags: [config]
      summary: Update login code
      description: Updates the login code sequence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLoginCodeBody"
      responses:
        "200":
          description: Updated login code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginCodeConfig"
  /campus-passwords:
    get:
      operationId: listCampusPasswords
      tags: [campusPasswords]
      summary: List campus password status
      responses:
        "200":
          description: Campus password status list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampusPasswordList"
    post:
      operationId: setCampusPassword
      tags: [campusPasswords]
      summary: Set or update a campus password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetCampusPasswordBody"
      responses:
        "200":
          description: Password set successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampusPasswordEntry"
  /campus-passwords/history:
    get:
      operationId: getPasswordHistory
      tags: [campus-passwords]
      summary: Get password change history
      description: Returns a log of all campus password changes (master admin only)
      responses:
        "200":
          description: Password history entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordHistoryList"
  /campus-passwords/verify:
    post:
      operationId: verifyCampusPassword
      tags: [campusPasswords]
      summary: Verify a campus login password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyCampusPasswordBody"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyCampusPasswordResponse"
  /workers:
    get:
      operationId: listWorkers
      tags: [workers]
      summary: List all workers
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: campus
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of workers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerList"
    post:
      operationId: createWorker
      tags: [workers]
      summary: Create a new worker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkerBody"
      responses:
        "201":
          description: Created worker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Worker"
  /workers/{id}:
    put:
      operationId: updateWorker
      tags: [workers]
      summary: Update a worker
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkerBody"
      responses:
        "200":
          description: Updated worker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Worker"
    delete:
      operationId: deleteWorker
      tags: [workers]
      summary: Delete a worker
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted worker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Worker"
  /check-ins:
    get:
      operationId: listCheckIns
      tags: [check-ins]
      summary: List check-ins for a session
      parameters:
        - name: campus
          in: query
          required: true
          schema:
            type: string
        - name: service
          in: query
          required: true
          schema:
            type: string
        - name: serviceDate
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of check-ins
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInList"
    post:
      operationId: createCheckIn
      tags: [check-ins]
      summary: Check in a worker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckInBody"
      responses:
        "201":
          description: Created check-in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckIn"
  /check-ins/{id}:
    delete:
      operationId: deleteCheckIn
      tags: [check-ins]
      summary: Remove a check-in
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted check-in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckIn"
  /service-reports:
    get:
      operationId: listServiceReports
      tags: [service-reports]
      summary: List service reports
      parameters:
        - name: campus
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of service reports
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceReportList"
    post:
      operationId: upsertServiceReport
      tags: [service-reports]
      summary: Create or update a service report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertServiceReportBody"
      responses:
        "200":
          description: Upserted service report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceReport"
  /service-notes:
    get:
      operationId: getServiceNotes
      tags: [service-notes]
      summary: Get notes for a service session
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
        - name: service
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Service notes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceNotes"
    post:
      operationId: saveServiceNotes
      tags: [service-notes]
      summary: Create or update service notes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveServiceNotesBody"
      responses:
        "200":
          description: Saved service notes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceNotes"
  /daily-altar-reports:
    get:
      operationId: listDailyAltarReports
      tags: [daily-altar-reports]
      summary: List daily altar reports
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: integer
        - name: year
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of daily altar reports
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyAltarReportList"
    post:
      operationId: upsertDailyAltarReport
      tags: [daily-altar-reports]
      summary: Create or update a daily altar report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertDailyAltarReportBody"
      responses:
        "200":
          description: Upserted daily altar report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyAltarReport"
  /daily-altar-reports/{id}:
    delete:
      operationId: deleteDailyAltarReport
      tags: [daily-altar-reports]
      summary: Delete a daily altar report entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyAltarReport"
  /altar-reports:
    get:
      operationId: listAltarReports
      tags: [altar-reports]
      summary: List all altar reports
      responses:
        "200":
          description: List of altar reports
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AltarReportList"
    post:
      operationId: createAltarReport
      tags: [altar-reports]
      summary: Create a new altar report entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAltarReportBody"
      responses:
        "201":
          description: Created altar report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AltarReport"
  /altar-reports/{id}:
    delete:
      operationId: deleteAltarReport
      tags: [altar-reports]
      summary: Delete an altar report entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AltarReport"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    VerifyLoginBody:
      type: object
      properties:
        sequence:
          type: array
          items:
            type: integer
          description: Array of letter numbers the user clicked in order
      required:
        - sequence
    LoginResult:
      type: object
      properties:
        success:
          type: boolean
        partial:
          type: boolean
        message:
          type: string
        role:
          type: string
          description: "master | lead | deputy_lead — only present on success"
        campus:
          type: string
          description: "Campus name — only present when role is lead or deputy_lead"
      required:
        - success
        - message
    LoginCodeConfig:
      type: object
      properties:
        code:
          type: array
          items:
            type: integer
          description: The ordered sequence of letter numbers that grant access
        updatedAt:
          type: string
          format: date-time
      required:
        - code
        - updatedAt
    UpdateLoginCodeBody:
      type: object
      properties:
        code:
          type: array
          items:
            type: integer
          description: New sequence of letter numbers
        adminPassword:
          type: string
          description: Admin password to authorize the change
      required:
        - code
        - adminPassword
    Worker:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
        category:
          type: string
        campus:
          type: string
        photoUrl:
          type: string
        onHold:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - category
        - campus
        - onHold
        - createdAt
    CreateWorkerBody:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
        category:
          type: string
        campus:
          type: string
        photoUrl:
          type: string
      required:
        - name
        - category
        - campus
    UpdateWorkerBody:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
        campus:
          type: string
        photoUrl:
          type: string
        onHold:
          type: boolean
    WorkerList:
      type: object
      properties:
        workers:
          type: array
          items:
            $ref: "#/components/schemas/Worker"
      required:
        - workers
    CheckIn:
      type: object
      properties:
        id:
          type: integer
        workerId:
          type: integer
        campus:
          type: string
        service:
          type: string
        serviceDate:
          type: string
        checkedInAt:
          type: string
          format: date-time
      required:
        - id
        - workerId
        - campus
        - service
        - serviceDate
        - checkedInAt
    CreateCheckInBody:
      type: object
      properties:
        workerId:
          type: integer
        campus:
          type: string
        service:
          type: string
        serviceDate:
          type: string
      required:
        - workerId
        - campus
        - service
        - serviceDate
    CheckInList:
      type: object
      properties:
        checkIns:
          type: array
          items:
            $ref: "#/components/schemas/CheckIn"
      required:
        - checkIns
    ServiceReport:
      type: object
      properties:
        id:
          type: integer
        campus:
          type: string
        service:
          type: string
        serviceDate:
          type: string
        totalEntries:
          type: integer
        servants:
          type: integer
        salvations:
          type: integer
        prayers:
          type: integer
        family:
          type: integer
        notes:
          type: string
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - campus
        - service
        - serviceDate
        - totalEntries
        - servants
        - salvations
        - prayers
        - family
        - updatedAt
    UpsertServiceReportBody:
      type: object
      properties:
        campus:
          type: string
        service:
          type: string
        serviceDate:
          type: string
        totalEntries:
          type: integer
        servants:
          type: integer
        salvations:
          type: integer
        prayers:
          type: integer
        family:
          type: integer
        notes:
          type: string
      required:
        - campus
        - service
        - serviceDate
    ServiceReportList:
      type: object
      properties:
        reports:
          type: array
          items:
            $ref: "#/components/schemas/ServiceReport"
      required:
        - reports
    AltarReport:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        campus:
          type: string
        service:
          type: string
        responseType:
          type: string
        phone:
          type: string
        email:
          type: string
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - campus
        - service
        - responseType
        - createdAt
    CreateAltarReportBody:
      type: object
      properties:
        name:
          type: string
        campus:
          type: string
        service:
          type: string
        responseType:
          type: string
        phone:
          type: string
        email:
          type: string
        notes:
          type: string
      required:
        - name
        - campus
        - service
        - responseType
    AltarReportList:
      type: object
      properties:
        reports:
          type: array
          items:
            $ref: "#/components/schemas/AltarReport"
      required:
        - reports
    ServiceNotes:
      type: object
      properties:
        date:
          type: string
        service:
          type: string
        notes:
          type: string
      required:
        - date
        - service
        - notes
    SaveServiceNotesBody:
      type: object
      properties:
        date:
          type: string
        service:
          type: string
        notes:
          type: string
      required:
        - date
        - service
        - notes
    DailyAltarReport:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        campus:
          type: string
        service:
          type: string
        salvations:
          type: integer
        prayers:
          type: integer
        altarMembers:
          type: integer
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - date
        - campus
        - service
        - salvations
        - prayers
        - altarMembers
        - notes
        - createdAt
        - updatedAt
    UpsertDailyAltarReportBody:
      type: object
      properties:
        date:
          type: string
        campus:
          type: string
        service:
          type: string
        salvations:
          type: integer
        prayers:
          type: integer
        altarMembers:
          type: integer
        notes:
          type: string
      required:
        - date
        - campus
        - service
    DailyAltarReportList:
      type: object
      properties:
        reports:
          type: array
          items:
            $ref: "#/components/schemas/DailyAltarReport"
      required:
        - reports
    CampusPasswordEntry:
      type: object
      properties:
        campus:
          type: string
        role:
          type: string
        hasPassword:
          type: boolean
        sequence:
          type: array
          items:
            type: integer
      required:
        - campus
        - role
        - hasPassword
    CampusPasswordList:
      type: object
      properties:
        passwords:
          type: array
          items:
            $ref: "#/components/schemas/CampusPasswordEntry"
      required:
        - passwords
    SetCampusPasswordBody:
      type: object
      properties:
        campus:
          type: string
        role:
          type: string
        sequence:
          type: array
          items:
            type: integer
          description: Hebrew letter number sequence
      required:
        - campus
        - role
        - sequence
    VerifyCampusPasswordBody:
      type: object
      properties:
        campus:
          type: string
        role:
          type: string
        password:
          type: string
      required:
        - campus
        - role
        - password
    PasswordHistoryEntry:
      type: object
      properties:
        id:
          type: integer
        campus:
          type: string
        role:
          type: string
        sequence:
          type: array
          items:
            type: integer
        changedAt:
          type: string
          format: date-time
      required:
        - id
        - campus
        - role
        - sequence
        - changedAt
    PasswordHistoryList:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/PasswordHistoryEntry"
      required:
        - entries
    VerifyCampusPasswordResponse:
      type: object
      properties:
        valid:
          type: boolean
      required:
        - valid
