<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 430px; height: 932px;
    background: #06050f;
    font-family: Georgia, serif;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .status { height: 54px; display: flex; align-items: flex-end; justify-content: space-between;
    padding: 0 28px 10px; flex-shrink: 0; }
  .status-time { font-family: -apple-system, sans-serif; font-size: 15px; font-weight: 600; color: #fff; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .battery { width: 25px; height: 12px; border: 1.5px solid #fff; border-radius: 3px; position: relative; padding: 2px; }
  .battery::after { content:''; position:absolute; right:-5px; top:3px; width:3px; height:6px; background:#fff; border-radius:1px; }
  .battery-fill { height: 100%; width: 80%; background: #fff; border-radius: 1.5px; }

  .header { display: flex; justify-content: space-between; align-items: center;
    padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
  .back { color: rgba(255,255,255,0.35); font-size: 11px; letter-spacing: 2px; }
  .hamburger { display: flex; flex-direction: column; gap: 4px; }
  .hline { width: 18px; height: 1.5px; background: rgba(255,255,255,0.6); border-radius: 2px; }

  .church-name { text-align: center; font-size: 10px; letter-spacing: 4px;
    color: rgba(255,255,255,0.2); padding: 8px 0; flex-shrink: 0; }

  .tiles { flex: 1; padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }
  .tile {
    flex: 1; border-radius: 22px; border-width: 1.5px; border-style: solid;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 6px;
  }
  .tile-emoji { font-size: 52px; }
  .tile-label { font-size: 12px; letter-spacing: 3px; opacity: 0.7; }

  .home-indicator { height: 22px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; flex-shrink: 0; }
  .hi-bar { width: 134px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 3px; }
</style>
</head>
<body>
  <div class="status">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 2.4C10.7 2.4 13.1 3.5 14.8 5.3L16 4C14 1.9 11.1 0.6 8 0.6C4.9 0.6 2 1.9 0 4L1.2 5.3C2.9 3.5 5.3 2.4 8 2.4Z" fill="white"/><path d="M8 5.2C9.8 5.2 11.4 6 12.5 7.2L13.7 5.9C12.3 4.4 10.3 3.5 8 3.5C5.7 3.5 3.7 4.4 2.3 5.9L3.5 7.2C4.6 6 6.2 5.2 8 5.2Z" fill="white"/><circle cx="8" cy="10" r="1.8" fill="white"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="5" width="3" height="7" rx="1" fill="white"/><rect x="4.5" y="3" width="3" height="9" rx="1" fill="white"/><rect x="9" y="1" width="3" height="11" rx="1" fill="white"/></svg>
      <div class="battery"><div class="battery-fill"></div></div>
    </div>
  </div>

  <div class="header">
    <span class="back">← BACK</span>
    <div class="hamburger"><div class="hline"></div><div class="hline"></div><div class="hline"></div></div>
  </div>

  <div class="church-name">THE WAY WORLD OUTREACH</div>

  <div class="tiles">
    <div class="tile" style="background:linear-gradient(135deg,#091828,#0d2240,#091828);border-color:rgba(56,130,200,0.4);box-shadow:0 0 36px rgba(56,130,200,0.35);">
      <div class="tile-emoji">🙏</div>
    </div>
    <div class="tile" style="background:linear-gradient(135deg,#92651a,#b8860b,#7a4f10);border-color:rgba(184,134,11,0.4);box-shadow:0 0 36px rgba(184,134,11,0.35);">
      <span style="font-size:52px;">✅</span><span style="font-size:32px;font-weight:700;color:#fff;letter-spacing:-0.5px;margin-top:-6px;">-in</span>
    </div>
    <div class="tile" style="background:linear-gradient(135deg,#4c1d95,#7c3aed,#6d28d9);border-color:rgba(124,58,237,0.5);box-shadow:0 0 36px rgba(124,58,237,0.4);">
      <div class="tile-emoji">📞</div>
    </div>
    <div class="tile" style="background:linear-gradient(135deg,#111827,#1f2937,#111827);border-color:rgba(100,120,160,0.3);box-shadow:0 0 36px rgba(100,120,160,0.2);">
      <div class="tile-emoji">⚙️</div>
    </div>
  </div>

  <div class="home-indicator"><div class="hi-bar"></div></div>
</body>
</html>
